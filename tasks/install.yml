---
- name: Ensure ConvertX paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ convertx_uid }}"
    group: "{{ convertx_gid }}"
  with_items:
    - "{{ convertx_base_path }}"
    - "{{ convertx_data_path }}"

- name: Ensure ConvertX support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ convertx_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ convertx_uid }}"
    group: "{{ convertx_gid }}"
  with_items:
    - env
    - labels
  register: convertx_support_files_result

- name: Run if self-building of ConvertX container image is not enabled
  when: "not convertx_container_image_self_build | bool"
  block:
    - name: Ensure ConvertX container image is pulled via community.docker.docker_image
      when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
      community.docker.docker_image:
        name: "{{ convertx_container_image }}"
        source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
        force_source: "{{ convertx_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
        force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else convertx_container_image_force_pull }}"
      register: convertx_container_image_pull_result_ansible_module
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: convertx_container_image_pull_result_ansible_module is not failed

    - name: Ensure ConvertX container image is pulled via ansible.builtin.command
      when: devture_systemd_docker_base_container_image_pull_method == 'command'
      ansible.builtin.command:
        cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ convertx_container_image }}"
      register: convertx_container_image_pull_result_command
      retries: "{{ devture_playbook_help_container_retries_count }}"
      delay: "{{ devture_playbook_help_container_retries_delay }}"
      until: convertx_container_image_pull_result_command is not failed
      changed_when: "'Downloaded newer image' in convertx_container_image_pull_result_command.stdout"

- name: Run if self-building of ConvertX container image is enabled
  when: "convertx_container_image_self_build | bool"
  block:
    - name: Ensure ConvertX repository is present on self-build
      ansible.builtin.git:
        repo: "{{ convertx_container_image_self_build_repo }}"
        version: "{{ convertx_container_image_self_build_repo_version }}"
        dest: "{{ convertx_container_image_self_build_src_files_path }}"
        force: "yes"
      register: convertx_git_pull_results

    - name: Ensure ConvertX container image is built
      community.docker.docker_image:
        name: "{{ convertx_container_image_self_build_name }}"
        source: build
        force_source: "{{ convertx_git_pull_results.changed if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
        force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else convertx_git_pull_results.changed }}"
        build:
          dockerfile: Dockerfile
          path: "{{ convertx_container_image_self_build_src_files_path }}"
          pull: true
          args:
      register: convertx_container_image_build_result

- name: Ensure ConvertX container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ convertx_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: convertx_network_creation_result

- name: Ensure ConvertX container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ convertx_container_network }}
  register: convertx_network_creation_result
  changed_when: convertx_network_creation_result.rc == 0
  failed_when: convertx_network_creation_result.rc != 0 and 'already exists' not in convertx_network_creation_result.stderr

- name: Ensure ConvertX systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/convertx.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ convertx_identifier }}.service"
    mode: "0644"
  register: convertx_systemd_service_result

- name: Determine whether ConvertX needs a restart
  ansible.builtin.set_fact:
    convertx_restart_necessary: >-
      {{
        convertx_support_files_result.changed | default(false)
        or convertx_systemd_service_result.changed | default(false)
        or convertx_container_image_pull_result_ansible_module.changed | default(false)
        or convertx_container_image_pull_result_command.changed | default(false)
        or convertx_container_image_build_result.changed | default(false)
      }}
